name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Link checker only — zero npm deps, no network: it decodes every
      # "Try it" #a= link in README.md and checks the app payload shape.
      - run: npm test
